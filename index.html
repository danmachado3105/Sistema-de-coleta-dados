<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pesquisa Culturama</title>
</head>
<body>
    <header>
        <h1>Pesquisa Online</h1>
    </header>
    <main>
        <section>
            <form action="" method="get">
                <fieldset>
                    
                    <legend>Dados Pessoais</legend>
                    <!--Nome do usuario-->   
                    <label for="UserName">Nome</label>
                    <input type="text" name="UserName" required> 
                    <br>
                    <!--Idade-->                
                    <label for="age">idade</label>
                    <input type="number" name="age" min="12" max="100" required> 
                    <br>
                    <!--Data de nascimento-->
                    <label for="BirthDate">Data de Nascimento</label>
                    <input type="date" name="BirthDate" required> 
                    <br>
                    <!--Email-->
                    <label for="Email">E-mail</label>
                    <input type="email" name="Email" required>
                    <br>
                    <!--Telefone-->
                    <label for="phone">Telefone</label>
                    <input type="tel" name="phone" pattern="[0-9]{11}" placeholder="DDD + número sem espaços ou hífen">
                    <br>
                    <!--Foto-->
                    <label for="Image">Upload de Foto</label>
                    <input type="file" accept="image/*" name="Image">
                    <br>

                </fieldset>
                
                <button type="submit">Enviar</button>

            </form>
        </section>
    </main>
</body>
</html>
